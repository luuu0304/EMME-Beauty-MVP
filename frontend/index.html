<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMME Beauty - Gestión</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <aside class="sidebar">
        <div class="logo-text">EMME</div>
        <div class="menu-item active">Turnos</div>
        <div class="menu-item">Clientas</div>
        <div class="menu-item">Empleados</div>
        <div class="menu-item">Resúmenes</div>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Gestión de Turnos</h1>
            <div class="header-actions">
                <input type="text" id="buscadorClientas" placeholder="Buscar clienta..." style="display: none;">
                
                <button class="btn-primary" id="btnNuevaClienta" onclick="abrirModal()" style="display: none;">+ Nueva Clienta</button>
                
                <button class="btn-primary" id="btnNuevoTurno" onclick="abrirModalTurno()">+ Nuevo Turno</button>

                <button class="btn-primary" id="btnNuevaEmpleada" onclick="abrirModalEmpleada()" style="display: none;">+ Nueva Empleada</button>
            </div>
        </div>

        <div id="seccionTurnos">
            <div id="calendario"></div>
        </div>

        <div id="seccionClientas" style="display: none;">
            <div class="cards-grid">
                </div>
        </div>

        <div id="seccionEmpleados" style="display: none;">
            <div class="cards-grid" id="contenedorEmpleadas">
                <!-- Se llena automáticamente con JavaScript -->
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalNuevaClienta">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registre un nuevo Cliente</h2>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombreInput" placeholder="Ej. Luciana">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellidoInput" placeholder="Ej. Navarro">
                </div>
            </div>

            <div class="form-group">
                <label>Cumpleaños</label>
                <input type="date" id="cumpleInput">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefonoInput" placeholder="387...">
                </div>
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="igInput" placeholder="@usuario">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-primary" onclick="guardarClienta()">Registrar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalNuevoTurno">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agendar Nuevo Turno</h2>
            </div>
            
            <!-- INICIO ZONA CLIENTA -->
            <div class="form-group" id="grupoSeleccionClienta">
                <label for="selectClientaTurno">Clienta</label>
                <div style="display: flex; gap: 10px;">
                    <select id="selectClientaTurno" style="flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                        <!-- Se llena con JS -->
                    </select>
                    <button type="button" id="btnNuevaClientaExpress" class="btn-secundario">+ Nueva</button>
                </div>
            </div>

            <div class="form-group" id="grupoClientaExpress" style="display: none; background-color: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #333;">Registrar Nueva Clienta</label>
                <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                    <!-- Agregamos pointer-events y z-index para asegurar que sean clickeables -->
                    <input type="text" id="nombreExpress" placeholder="Nombre" style="flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; pointer-events: auto; position: relative; z-index: 10;">
                    <input type="text" id="apellidoExpress" placeholder="Apellido" style="flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; pointer-events: auto; position: relative; z-index: 10;">
                </div>
                <div style="text-align: right;">
                    <button type="button" id="btnCancelarExpress" style="font-size: 12px; color: #888; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0;">
                        Cancelar y elegir existente
                    </button>
                </div>
            </div>
            <!-- FIN ZONA CLIENTA -->

            <div class="form-row">
                <div class="form-group">
                    <label>Profesional</label>
                    <select id="selectEmpleadaTurno">
                        <option value="">Seleccione...</option>
                        <option value="1">Mili</option>
                        <option value="2">Meli</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Servicio</label>
                    <select id="selectServicioTurno">
                        <option value="">Seleccione...</option>
                        <option value="1">Kapping Gel</option>
                        <option value="2">Lifting de Pestañas</option>
                        <option value="3">Manicura Semipermanente</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="fechaTurnoInput">
                </div>
                <div class="form-group">
                    <label>Hora</label>
                    <input type="time" id="horaTurnoInput">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModalTurno()">Cancelar</button>
                <button class="btn-primary" onclick="guardarTurno()">Agendar</button>
            </div>
        </div>
    </div>

    <!-- Modal Nueva Empleada -->
    <div class="modal-overlay" id="modalNuevaEmpleada">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Nueva Profesional</h2>
            </div>
            
            <div class="form-group">
                <label>Nombre y Apellido</label>
                <input type="text" id="nombreEmpleadaInput" placeholder="Ej. Martina Gómez">
            </div>

            <div class="form-group">
                <label>DNI</label>
                <input type="text" id="dniEmpleadaInput" placeholder="Sin puntos, ej. 40123456">
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModalEmpleada()">Cancelar</button>
                <button class="btn-primary" onclick="guardarEmpleada()">Registrar</button>
            </div>
        </div>
    </div>
    
    <!-- Contenedor para notificaciones (Toasts) -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
